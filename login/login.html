<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lixeira Inteligente · Acesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>
  <main class="page">
    <div class="container" id="container">

      <header class="header">
        <span class="logo-mark"></span>
        <h1 class="title">Lixeira Inteligente</h1>
        <p class="subtitle">Sistema de Monitoramento Urbano</p>
      </header>

      <form class="form" id="form" novalidate>
        <div class="field" id="field-user">
          <label for="username">Usuário</label>
          <input id="username" type="text" placeholder="seu.usuario" autocomplete="username" spellcheck="false"/>
          <span class="err" id="err-user"></span>
        </div>

        <div class="field" id="field-pass">
          <label for="password">Senha</label>
          <div class="pass-wrap">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" id="toggle-pw" tabindex="-1">mostrar</button>
          </div>
          <span class="err" id="err-pass"></span>
        </div>

        <button type="submit" id="btn" class="btn">
          <span id="btn-label">Entrar</span>
        </button>
      </form>

      <footer class="footer">Acesso restrito a operadores autorizados.</footer>

    </div>
  </main>
  <script src="login.js"></script>
</body>
</html>
